<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiblioQuiz Legacy v100</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --ink: #1a1a1a; --parchment: #fdfaf3; --burgundy: #630d0d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* RESET TOTAL PARA EVITAR TELA BRANCA */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Lora', serif; background: #000; overflow: hidden; 
        }

        /* CAMADA DE ENTRADA (ESTÁTICA POR SEGURANÇA) */
        #intro-layer {
            position: fixed; inset: 0; z-index: 9999;
            background: radial-gradient(circle, #2c3e50, #000);
            display: flex; align-items: center; justify-content: center;
        }

        .book-card {
            width: 280px; height: 400px; background: var(--burgundy);
            border: 4px solid var(--gold); border-left: 15px solid #4a0a0a;
            border-radius: 5px 15px 15px 5px; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px 20px; text-align: center; color: var(--gold); cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* HOME SCREEN - GARANTIA DE EXIBIÇÃO */
        #home-screen {
            display: none; width: 100%; height: 100%; 
            background: #fdfaf3; /* Fundo sólido para segurança */
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        .glass-panel {
            background: white; width: 100%; max-width: 380px;
            padding: 30px; border: 3px double var(--ink); border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center;
        }

        .btn-nav {
            width: 100%; padding: 15px; margin: 8px 0; border: 1px solid var(--ink);
            background: #fff; font-family: 'Cinzel'; font-size: 0.8rem; cursor: pointer;
        }
        .btn-nav.active { background: var(--gold); color: white; border-color: white; }

        .btn-start { 
            width: 100%; padding: 18px; margin-top: 20px; background: var(--burgundy);
            color: white; font-family: 'Cinzel'; border: none; font-weight: bold;
            display: none;
        }

        /* MODAL DE FEEDBACK INTERNO (Adeus Alerts do Navegador) */
        #feedback-modal {
            display: none; position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--parchment); border: 2px solid var(--gold);
            width: 85%; max-width: 350px; padding: 30px; text-align: center;
        }
    </style>
</head>
<body>

    <!-- CAMADA 1: ABERTURA (Simples e Eficaz) -->
    <div id="intro-layer" onclick="launch()">
        <div class="book-card" id="book-element">
            <div style="border-bottom: 1px solid var(--gold); width: 100%; padding-bottom: 10px; font-size: 0.6rem;">UFPB ACADÊMICO</div>
            <h1 style="font-family: 'Cinzel'; font-size: 1.4rem;">BIBLIOQUIZ<br>LEGACY</h1>
            <p style="font-style: italic; font-size: 0.7rem; color: #fff;">Toque para Pesquisar</p>
        </div>
    </div>

    <!-- CAMADA 2: HOME (Carregamento Prioritário) -->
    <div id="home-screen">
        <div class="glass-panel">
            <h2 style="font-family: 'Cinzel'; color: var(--burgundy); margin: 0;">Portal de Acesso</h2>
            <p style="font-size: 0.7rem; margin-bottom: 20px;">Selecione sua trajetória acadêmica.</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <button class="btn-nav" onclick="pick('lvl', 'graduacao', this)">GRAD</button>
                <button class="btn-nav" onclick="pick('lvl', 'mestrado', this)">MESTR</button>
                <button class="btn-nav" onclick="pick('lvl', 'doutorado', this)">DOUT</button>
            </div>

            <div style="margin-top: 10px;">
                <button class="btn-nav" onclick="pick('mode', 'solo', this)">SOLO VS CPU</button>
                <button class="btn-nav" onclick="pick('mode', 'p2', this)">DUELO (P2)</button>
            </div>

            <button id="start-btn" class="btn-start" onclick="alert('Iniciando sistema...')">INICIAR CICLO</button>
        </div>
    </div>

    <script>
        let config = { lvl: '', mode: '' };

        function launch() {
            const book = document.getElementById('book-element');
            const intro = document.getElementById('intro-layer');
            const home = document.getElementById('home-screen');

            // Animação de saída rápida
            book.style.transform = "scale(0.8) rotateY(-20deg)";
            book.style.opacity = "0";
            
            setTimeout(() => {
                intro.style.display = "none";
                home.style.display = "flex";
            }, 400);
        }

        function pick(type, val, el) {
            const container = el.parentElement;
            container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            config[type] = val;
            
            if(config.lvl && config.mode) {
                document.getElementById('start-btn').style.display = 'block';
            }
        }
    </script>
</body>
</html>
