<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioQuiz: Academic Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --parchment: #f9f4e8; --ink: #2c3e50; --burgundy: #800020; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Lora', serif; background: #000; color: var(--ink); overflow: hidden; }
        
        /* ABERTURA: LIVRO INSPIRADOR */
        #book-intro {
            position: absolute; width: 100vw; height: 100vh; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center; z-index: 100; transition: 2s;
        }
        .book {
            width: 300px; height: 400px; background: var(--burgundy); border: 4px solid var(--gold);
            border-radius: 5px 15px 15px 5px; box-shadow: 20px 20px 60px rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 1.5s; transform-style: preserve-3d;
        }
        .book:hover { transform: rotateY(-30deg); }
        .book-title { font-family: 'Cinzel'; color: var(--gold); text-align: center; padding: 20px; border: 1px solid var(--gold); margin: 10px; }

        /* HOME / MENU PRINCIPAL */
        #home-menu {
            display: none; width: 100vw; height: 100vh; background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
        .menu-box { background: var(--parchment); padding: 50px; border: 5px double var(--ink); text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        
        /* BOTÕES ACADÊMICOS */
        .btn-nav {
            display: block; width: 300px; padding: 15px; margin: 10px auto; 
            font-family: 'Cinzel'; background: white; border: 2px solid var(--ink); cursor: pointer; transition: 0.3s;
        }
        .btn-nav:hover { background: var(--burgundy); color: white; transform: scale(1.05); }
        .btn-mode { background: var(--gold); border: none; font-weight: bold; }

        /* INTERFACE DE JOGO */
        #game-area { display: none; width: 100vw; height: 100vh; align-items: center; justify-content: center; background-size: cover; transition: 1s; }
        .card { width: 420px; background: var(--parchment); border: 3px solid var(--gold); padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .subject-tag { display: inline-block; padding: 5px 15px; color: white; font-family: 'Cinzel'; font-size: 0.7rem; margin-bottom: 15px; }
        .option { padding: 12px; border: 1px solid #ccc; margin: 8px 0; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: rgba(128, 0, 32, 0.1); border-color: var(--burgundy); }
    </style>
</head>
<body>

    <!-- 1. ABERTURA: O LIVRO -->
    <div id="book-intro" onclick="openBook()">
        <div class="book" id="main-book">
            <div class="book-title">
                <h2 style="font-size: 1rem;">O Legado do<br>Bibliotecário</h2>
                <hr color="#d4af37">
                <p style="font-size: 0.6rem;">CLIQUE PARA ABRIR</p>
            </div>
        </div>
    </div>

    <!-- 2. HOME: MENU DE ESCOLHAS -->
    <div id="home-menu">
        <div class="menu-box">
            <h1 style="font-family: 'Cinzel';">BiblioQuiz Pro</h1>
            <p>Selecione o Ciclo Acadêmico:</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn-nav" onclick="setLevel('graduacao')">Graduação</button>
                <button class="btn-nav" onclick="setLevel('mestrado')">Mestrado</button>
                <button class="btn-nav" onclick="setLevel('doutorado')">Doutorado</button>
            </div>
            <hr>
            <p>Modo de Confronto:</p>
            <button class="btn-nav btn-mode" onclick="setMode('cpu')">Solo vs Sistema (CPU)</button>
            <button class="btn-nav btn-mode" onclick="setMode('multi')">Duelo Acadêmico (P2)</button>
        </div>
    </div>

    <!-- 3. ÁREA DE JOGO -->
    <div id="game-area">
        <div class="card">
            <div id="tag" class="subject-tag"></div>
            <div id="persona" style="font-family:'Cinzel'; color: var(--burgundy);"></div>
            <p id="speech" style="font-style: italic; color: #555; font-size: 0.9rem;"></p>
            <div id="question" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 20px;"></div>
            <div id="options"></div>
            <div id="feedback" style="display:none; margin-top: 20px;">
                <p id="msg"></p>
                <a id="source" href="#" target="_blank" style="color: var(--burgundy); font-size: 0.8rem;">Ver Documentação Científica</a>
                <button class="btn-nav" onclick="nextQuestion()" style="width:100%">Próxima Carta</button>
            </div>
        </div>
    </div>

    <audio id="snd-flip" src="https://www.soundjay.com/misc/sounds/page-flip-01a.mp3"></audio>

    <script>
        let config = { level: '', mode: '', currentIdx: 0 };
        const bgs = {
            graduacao: "url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2000')",
            mestrado: "url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2000')",
            doutorado: "url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=2000')"
        };

        const database = {
            graduacao: [
                { t: "Catalogação", p: "Antônio Garcia Miranda", s: "A ordem é a alma da biblioteca.", q: "O que define a NBR 6023?", o: ["Referências Bibliográficas", "Sumário", "Citações", "Lombada"], a: 0, f: "https://www.ufpb.br/biblioteca/contents/menu/servicos/normalizacao/normas-da-abnt" }
            ],
            mestrado: [
                { t: "Epistemologia", p: "Tefko Saracevic", s: "A ciência da informação não é estática.", q: "O conceito de 'Relevância' é:", o: ["Binário", "Multidimensional", "Desnecessário", "Físico"], a: 1, f: "https://onlinelibrary.wiley.com/journal/15322890" }
            ]
        };

        function openBook() {
            document.getElementById('snd-flip').play();
            document.getElementById('main-book').style.transform = "rotateY(-180deg) scale(2)";
            document.getElementById('main-book').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('book-intro').style.display = 'none';
                document.getElementById('home-menu').style.display = 'flex';
            }, 1000);
        }

        function setLevel(l) { config.level = l; checkStart(); }
        function setMode(m) { config.mode = m; checkStart(); }

        function checkStart() {
            if(config.level && config.mode) {
                document.getElementById('home-menu').style.display = 'none';
                document.getElementById('game-area').style.display = 'flex';
                document.getElementById('game-area').style.backgroundImage = bgs[config.level];
                loadQuestion();
            }
        }

        function loadQuestion() {
            const data = database[config.level][config.currentIdx];
            document.getElementById('snd-flip').play();
            document.getElementById('tag').innerText = data.t;
            document.getElementById('tag').style.background = data.t === "Catalogação" ? "#9b59b6" : "#800020";
            document.getElementById('persona').innerText = data.p;
            document.getElementById('speech').innerText = `"${data.s}"`;
            document.getElementById('question').innerText = data.q;
            document.getElementById('feedback').style.display = 'none';
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            opts.style.display = 'block';
            data.o.forEach((opt, i) => {
                const b = document.createElement('div');
                b.className = 'option';
                b.innerText = opt;
                b.onclick = () => {
                    opts.style.display = 'none';
                    document.getElementById('feedback').style.display = 'block';
                    document.getElementById('msg').innerText = i === data.a ? "✅ VALIDAÇÃO CONCLUÍDA." : "❌ ERRO DE FONTES.";
                    document.getElementById('source').href = data.f;
                };
                opts.appendChild(b);
            });
        }

        function nextQuestion() {
            config.currentIdx++;
            if(database[config.level][config.currentIdx]) loadQuestion();
            else { alert("Ciclo finalizado."); location.reload(); }
        }
    </script>
</body>
</html>
