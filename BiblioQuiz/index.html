<!-- SUBSTITUA A CAMADA 1 E O CSS DE INTRO POR ESTE -->
<style>
    /* CSS REFINADO PARA APRESENTAÇÃO */
    #intro-layer {
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: radial-gradient(circle at center, #2c3e50 0%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.5s;
    }

    .book-container {
        perspective: 1200px;
        width: 280px;
        height: 380px;
        cursor: pointer;
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) rotateX(5deg); }
        50% { transform: translateY(-15px) rotateX(10deg); }
    }

    .ancient-book {
        width: 100%;
        height: 100%;
        background: var(--burgundy);
        border: 4px solid var(--gold);
        border-left: 15px solid #4a0a0a; /* Lombada reforçada */
        border-radius: 5px 15px 15px 5px;
        box-shadow: 25px 25px 60px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 40px 20px;
        transform-style: preserve-3d;
        transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .ancient-book:hover {
        transform: rotateY(-25deg) scale(1.05);
    }

    .book-content {
        text-align: center;
        pointer-events: none;
    }

    .university-seal {
        font-family: 'Cinzel';
        font-size: 0.6rem;
        letter-spacing: 3px;
        color: var(--gold);
        border-bottom: 1px solid var(--gold);
        margin-bottom: 20px;
        padding-bottom: 10px;
    }

    .main-title {
        font-family: 'Cinzel';
        font-size: 1.4rem;
        color: var(--gold);
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        margin: 20px 0;
    }

    .action-call {
        font-family: 'Lora';
        font-style: italic;
        font-size: 0.7rem;
        color: #fff;
        opacity: 0.8;
        letter-spacing: 1px;
    }

    /* ESTADO ABERTO */
    .book-open {
        transform: rotateY(-180deg) scale(1.5) !important;
        opacity: 0;
    }
</style>

<!-- CAMADA 1: ABERTURA REPROJETADA -->
<div id="intro-layer">
    <div class="book-container" onclick="handleBookOpen(this)">
        <div class="ancient-book" id="physical-book">
            <div class="book-content">
                <div class="university-seal">UFPB • BIBLIOTECONOMIA</div>
                <h1 class="main-title">BIBLIOQUIZ<br>LEGACY</h1>
            </div>
            <div class="action-call">Toque para desbravar o acervo</div>
        </div>
    </div>
</div>

<script>
    // LÓGICA DE APRESENTAÇÃO CORRIGIDA
    function handleBookOpen(container) {
        const book = document.getElementById('physical-book');
        const layer = document.getElementById('intro-layer');
        const flipSnd = document.getElementById('flip-snd');

        // Play no som de papel
        if(flipSnd) flipSnd.play();

        // Animação de abertura
        book.classList.add('book-open');
        
        // Transição para a Home
        setTimeout(() => {
            layer.style.opacity = '0';
            layer.style.visibility = 'hidden';
            
            // Ativa a Home Screen
            const home = document.getElementById('home-screen');
            if(home) {
                home.style.display = 'flex';
                home.style.animation = 'fadeIn 1s forwards';
            }
        }, 1000);
    }
</script>
