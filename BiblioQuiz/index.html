<!-- 1. ADICIONE ESTE CSS PARA O NOVO MODAL (MODAL DE FEEDBACK) -->
<style>
    /* MODAL DE FEEDBACK ACADÊMICO (Nível 100) */
    #feedback-modal {
        display: none; position: fixed; inset: 0; z-index: 3000;
        background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
        backdrop-filter: blur(5px);
    }
    .modal-box {
        background: var(--parchment); border: 3px double var(--ink);
        width: 85%; max-width: 350px; padding: 30px; text-align: center;
        box-shadow: 0 0 50px rgba(0,0,0,0.5); transform: scale(0.8);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-box.active { transform: scale(1); }
    .status-icon { font-size: 2.5rem; margin-bottom: 15px; }
    .status-text { font-family: 'Cinzel'; font-size: 1.1rem; color: var(--burgundy); margin: 10px 0; }
    .source-btn { 
        margin-top: 20px; background: var(--ink); color: white; 
        padding: 12px; width: 100%; border: none; font-family: 'Cinzel'; cursor: pointer;
    }
</style>

<!-- 2. INSIRA ESTE HTML NO FINAL DO BODY -->
<div id="feedback-modal">
    <div class="modal-box" id="modal-content">
        <div id="modal-icon" class="status-icon"></div>
        <div id="modal-status" class="status-text"></div>
        <p id="modal-msg" style="font-size: 0.85rem; font-style: italic; color: #555;"></p>
        <button class="source-btn" onclick="closeFeedback()">Prosseguir Pesquisa</button>
    </div>
</div>

<!-- 3. SUBSTITUA A FUNÇÃO 'check' E O 'repo' NO SEU SCRIPT -->
<script>
    // Banco de Dados com Personagens (Curadoria Acadêmica)
    const repo = {
        graduacao: [
            { a: "Normalização", p: "Cássia Furtado", q: "A NBR 6023:2018 trata especificamente de:", o: ["Sumários", "Citações", "Referências", "Índices"], r: 2, msg: "A organização das fontes é o pilar da ciência." },
            { a: "Leis de Ranganathan", p: "S.R. Ranganathan", q: "Qual a 2ª Lei da Biblioteconomia?", o: ["Livros são para uso", "Para cada leitor, seu livro", "Poupe o tempo do leitor", "A biblioteca é um organismo"], r: 1, msg: "O conhecimento deve alcançar a todos." }
        ],
        mestrado: [
            { a: "Documentação", p: "Paul Otlet", q: "Quem é considerado o pai da Documentação?", o: ["Dewey", "Cutter", "Paul Otlet", "Lafontaine"], r: 2, msg: "Classificar é compreender o mundo." }
        ]
    };

    function loadQuestion() {
        const data = repo[game.lvl][game.idx];
        document.getElementById('area-badge').innerText = data.a;
        // Exibe o personagem que está perguntando
        document.getElementById('q-text').innerHTML = `<span style="color: var(--burgundy); font-size: 0.7rem; display: block; margin-bottom: 5px;">${data.p} questiona:</span>${data.q}`;
        
        document.getElementById('turn-info').innerText = game.mode === 'p2' ? `VEZ DO PESQUISADOR ${game.turn}` : "SISTEMA ATIVO";
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        data.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn-mode';
            b.style.fontSize = '0.85rem';
            b.innerText = opt;
            b.onclick = () => check(i, data.r, data.msg);
            container.appendChild(b);
        });
    }

    function check(chosen, correct, personalMsg) {
        const modal = document.getElementById('feedback-modal');
        const mContent = document.getElementById('modal-content');
        const mIcon = document.getElementById('modal-icon');
        const mStatus = document.getElementById('modal-status');
        const mMsg = document.getElementById('modal-msg');

        modal.style.display = 'flex';
        setTimeout(() => mContent.classList.add('active'), 10);

        if(chosen === correct) {
            if(game.turn === 1) game.s1++; else game.s2++;
            mIcon.innerText = "📜";
            mStatus.innerText = "PRECISÃO CIENTÍFICA";
            mMsg.innerText = personalMsg;
        } else {
            mIcon.innerText = "⚠️";
            mStatus.innerText = "DIVERGÊNCIA DOCUMENTAL";
            mMsg.innerText = "A fonte citada não corresponde ao registro.";
        }
        updateHUD();
    }

    function closeFeedback() {
        const modal = document.getElementById('feedback-modal');
        const mContent = document.getElementById('modal-content');
        mContent.classList.remove('active');
        
        setTimeout(() => {
            modal.style.display = 'none';
            game.idx++;
            if(game.mode === 'p2') game.turn = game.turn === 1 ? 2 : 1;

            if(repo[game.lvl] && repo[game.lvl][game.idx]) {
                loadQuestion();
            } else {
                alert(`Ciclo Acadêmico Completo!\nPontuação Final: P1: ${game.s1} | P2: ${game.s2}`);
                location.reload();
            }
        }, 300);
    }
</script>
