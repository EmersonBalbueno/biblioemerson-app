<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiblioQuiz vFinal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --ink: #1a1a1a; --burgundy: #630d0d; --paper: #fdfaf3; }
        body { margin: 0; font-family: 'Lora', serif; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg { position: fixed; inset: 0; background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=2000') center/cover; opacity: 0.3; z-index: -1; }
        
        /* TELAS */
        .card { background: var(--paper); width: 92%; max-width: 380px; padding: 25px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 10px 40px #000; position: relative; z-index: 10; }
        .hidden { display: none !important; }

        h2 { font-family: 'Cinzel'; color: var(--burgundy); font-size: 1.1rem; margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; margin: 4px 0; border: 1px solid var(--ink); background: #fff; font-family: 'Cinzel'; cursor: pointer; font-size: 0.8rem; }
        .btn.active { background: var(--gold); color: #fff; border-color: #fff; }
        .btn-go { background: var(--burgundy); color: #fff; font-weight: bold; margin-top: 15px; display: none; }
        
        /* JOGO */
        .q-text { font-weight: bold; text-align: left; margin: 20px 0; font-size: 0.9rem; line-height: 1.4; }
        .hud { display: flex; justify-content: space-between; font-family: 'Cinzel'; font-size: 0.65rem; border-bottom: 1px solid #ccc; padding-bottom: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="bg"></div>

    <!-- TELA INICIAL (Sincronizada com seu print) -->
    <div id="screen-config" class="card">
        <h2>PORTAL DE PESQUISA</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;">
            <button class="btn b-lvl" onclick="setVal('lvl', 'graduacao', this)">GRAD</button>
            <button class="btn b-lvl" onclick="setVal('lvl', 'mestrado', this)">MESTR</button>
            <button class="btn b-lvl" onclick="setVal('lvl', 'doutorado', this)">DOUT</button>
        </div>
        <div style="margin-top: 12px;">
            <button class="btn b-mod" onclick="setVal('mode', 'solo', this)">SOLO VS CPU</button>
            <button class="btn b-mod" onclick="setVal('mode', 'p2', this)">DUELO (P2)</button>
        </div>
        <button id="btn-start" class="btn btn-go" onclick="runGame()">INICIAR CICLO</button>
    </div>

    <!-- TELA DE QUESTÕES -->
    <div id="screen-game" class="card hidden">
        <div class="hud">
            <span id="txt-score">P1: 0</span>
            <span id="txt-turn" style="color:var(--burgundy)">VEZ DO P1</span>
        </div>
        <div id="q-box">
            <div id="display-q" class="q-text"></div>
            <div id="display-opts"></div>
        </div>
    </div>

    <script>
        let data = { lvl: '', mode: '', idx: 0, s1: 0, s2: 0, turn: 1 };
        
        const questions = {
            graduacao: [
                {q: "Na UFPB, qual autor é referência em Biblioteconomia Digital?", o: ["Cássia Furtado", "Melvil Dewey", "Paul Otlet"], a: 0},
                {q: "O que significa a sigla BDTD?", o: ["Banco de Dados Têxteis", "Biblioteca Digital de Teses e Dissertações", "Base de Dados de Tecnologia"], a: 1}
            ],
            mestrado: [
                {q: "Qual o foco da Teoria da Classificação Facetada?", o: ["Ranganathan", "Borko", "Luhn"], a: 0}
            ]
        };

        function setVal(type, val, el) {
            document.querySelectorAll('.b-' + (type==='lvl'?'lvl':'mod')).forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            data[type] = val;
            if(data.lvl && data.mode) document.getElementById('btn-start').style.display = 'block';
        }

        function runGame() {
            document.getElementById('screen-config').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            renderNext();
        }

        function renderNext() {
            let list = questions[data.lvl] || questions.graduacao;
            let current = list[data.idx];
            
            if(!current) {
                alert("Ciclo Finalizado! P1: " + data.s1 + (data.mode==='p2' ? " | P2: " + data.s2 : ""));
                return location.reload();
            }

            document.getElementById('display-q').innerText = current.q;
            document.getElementById('txt-turn').innerText = data.mode === 'p2' ? "TURNO: P" + data.turn : "MODO SOLO";
            
            let h = '';
            current.o.forEach((opt, i) => {
                h += `<button class="btn" onclick="checkAns(${i}, ${current.a})">${opt}</button>`;
            });
            document.getElementById('display-opts').innerHTML = h;
        }

        function checkAns(choice, correct) {
            if(choice === correct) {
                if(data.turn === 1) data.s1++; else data.s2++;
                alert("Correto!");
            } else {
                alert("Incorreto. Revise os conceitos.");
            }
            
            data.idx++;
            if(data.mode === 'p2') data.turn = data.turn === 1 ? 2 : 1;
            document.getElementById('txt-score').innerText = data.mode === 'p2' ? `P1:${data.s1} | P2:${data.s2}` : `PONTOS: ${data.s1}`;
            renderNext();
        }
    </script>
</body>
</html>
